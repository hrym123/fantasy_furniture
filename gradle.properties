mod_description=为 Minecraft 增添瓷砖、壁纸、屏风等装潢方块与家具，适合建筑与室内设计。需安装 GeckoLib 前置模组。

# GeckoLib（前置模组）Forge 工件版本；须与 CurseForge / Modrinth 上适用于 1.20.1 的发行版一致
